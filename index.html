
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POKERUZ</title>
    <style>
        body { margin: 0; background-color: #1a5c32; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .table { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .community-cards { display: flex; gap: 5px; margin-bottom: 20px; }
        .card { width: 50px; height: 75px; background: white; border-radius: 5px; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .player-hand { display: flex; gap: 10px; margin-bottom: 40px; }
        .my-card { width: 60px; height: 85px; background: #fff; border-radius: 5px; color: #000; display: flex; align-items: center; justify-content: center; border: 2px solid #ffd700; }
        .controls { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,0.8); }
        button { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; background: #444; color: white; }
    </style>
</head>
<body>
    <div style="padding: 10px; text-align: center;">💰 1,000,000 UZS</div>
    <div class="table">
        <div class="community-cards">
            <div class="card">10♠</div>
            <div class="card" style="color:red">J♦</div>
            <div class="card" style="color:green">2♣</div>
            <div class="card" style="color:red">2♥</div>
            <div class="card" style="color:green">5♣</div>
        </div>
        <div class="player-hand">
            <div class="my-card">8♦</div>
            <div class="my-card">4♠</div>
        </div>
    </div>
    <div class="controls">
        <button>FOLD</button>
        <button>CALL</button>
        <button style="background: #f1c40f; color: black;">RAISE</button>
    </div>
</body>
</html>
